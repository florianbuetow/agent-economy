<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATE — Task Lifecycle Demo</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:         #0b0e14;
    --bg-card:    #111620;
    --bg-row:     #0d1018;
    --bg-hover:   #161c2a;
    --bg-off:     #0f1219;
    --border:     #1c2333;
    --border-hi:  #2a3654;
    --text:       #e2e8f0;
    --text-mid:   #8b99b0;
    --text-dim:   #4a5568;
    --text-faint: #2a3654;
    --green:      #00e676;
    --green-dim:  rgba(0,229,118,.12);
    --green-fill: rgba(0,229,118,.18);
    --red:        #ff5252;
    --red-dim:    rgba(255,82,82,.12);
    --red-fill:   rgba(255,82,82,.15);
    --cyan:       #00e5ff;
    --cyan-dim:   rgba(0,229,255,.10);
    --cyan-fill:  rgba(0,229,255,.15);
    --yellow:     #ffd740;
    --amber:      #ff9100;
    --amber-dim:  rgba(255,145,0,.12);
    --violet:     #b388ff;
    --violet-dim: rgba(179,136,255,.12);
    --mono:       'SF Mono','Fira Code','JetBrains Mono','Cascadia Code',Consolas,monospace;
  }
  html { font-size: 14px; }
  body {
    font-family: var(--mono);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex; flex-direction: column;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 2px; }

  /* ── Animations ──────────────────────────── */
  @keyframes pulse-glow { 0%,100% { opacity:1; } 50% { opacity:.45; } }
  @keyframes fade-in { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  @keyframes slide-in { from { opacity:0; transform:translateX(-12px); } to { opacity:1; transform:translateX(0); } }
  @keyframes flash-green { 0% { background:var(--green-dim); } 100% { background:transparent; } }
  @keyframes flash-red { 0% { background:var(--red-dim); } 100% { background:transparent; } }
  @keyframes ticker-scroll { 0% { transform:translateX(0); } 100% { transform:translateX(-50%); } }
  @keyframes typing { from { width:0; } to { width:100%; } }
  @keyframes blink-caret { from,to { border-color:transparent; } 50% { border-color:var(--cyan); } }
  @keyframes scale-in { from { transform:scale(.92); opacity:0; } to { transform:scale(1); opacity:1; } }
  @keyframes progress-fill { from { width:0; } }
  @keyframes gavel-swing { 0%,100% { transform:rotate(0); } 25% { transform:rotate(-15deg); } 75% { transform:rotate(15deg); } }

  /* ── Top Nav ─────────────────────────────── */
  .topnav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; height: 44px; border-bottom: 1px solid var(--border);
    background: var(--bg); flex-shrink: 0;
  }
  .topnav-brand { display: flex; align-items: center; gap: 10px; }
  .topnav-logo {
    font-size: 15px; font-weight: 900; letter-spacing: 3px;
    background: linear-gradient(135deg, var(--cyan), var(--green));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .topnav-sep { width: 1px; height: 14px; background: var(--border-hi); }
  .topnav-sub { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-dim); }
  .topnav-right { display: flex; align-items: center; gap: 14px; }
  .topnav-link {
    font-size: 9px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim);
    cursor: pointer; transition: color .15s; padding: 2px 0;
  }
  .topnav-link:hover { color: var(--text-mid); }
  .topnav-link.active { color: var(--cyan); border-bottom: 1px solid var(--cyan); }
  .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse-glow 2s infinite; }
  .live-label { font-size: 8px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--green); font-weight: 700; }

  /* ── Main layout ─────────────────────────── */
  .main-area {
    flex: 1; display: flex; overflow: hidden;
  }

  /* ── Left: Task Lifecycle Panel ──────────── */
  .lifecycle-panel {
    flex: 1; display: flex; flex-direction: column; overflow: hidden;
    border-right: 1px solid var(--border);
  }
  .lifecycle-header {
    padding: 12px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .lifecycle-title {
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--text-dim); font-weight: 700;
  }
  .lifecycle-content {
    flex: 1; overflow-y: auto; padding: 0;
  }

  /* ── Phase indicator strip ───────────────── */
  .phase-strip {
    display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0;
    background: var(--bg-off);
  }
  .phase-step {
    flex: 1; text-align: center; padding: 10px 4px; position: relative;
    font-size: 8px; letter-spacing: 1px; text-transform: uppercase;
    color: var(--text-dim); font-weight: 600; transition: all .3s;
    border-bottom: 2px solid transparent;
  }
  .phase-step.completed { color: var(--green); border-bottom-color: var(--green); }
  .phase-step.active { color: var(--cyan); border-bottom-color: var(--cyan); background: var(--cyan-dim); }
  .phase-step.pending { color: var(--text-faint); }
  .phase-step .phase-icon { font-size: 14px; display: block; margin-bottom: 3px; }
  .phase-step .phase-check {
    position: absolute; top: 4px; right: 6px; font-size: 8px; color: var(--green);
  }

  /* ── Card sections ───────────────────────── */
  .card {
    margin: 12px 16px; border: 1px solid var(--border); background: var(--bg-card);
    animation: fade-in .4s ease-out both;
  }
  .card-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; border-bottom: 1px solid var(--border);
  }
  .card-label {
    font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--text-dim); font-weight: 700;
  }
  .card-body { padding: 14px; }
  .card-body.no-pad { padding: 0; }

  /* ── Task creation form ──────────────────── */
  .form-group { margin-bottom: 14px; }
  .form-group:last-child { margin-bottom: 0; }
  .form-label {
    font-size: 8px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--text-dim); font-weight: 600; margin-bottom: 5px; display: block;
  }
  .form-input, .form-textarea {
    width: 100%; font-family: var(--mono); font-size: 12px;
    background: var(--bg); border: 1px solid var(--border-hi);
    color: var(--text); padding: 8px 10px; outline: none;
    transition: border-color .2s;
  }
  .form-input:focus, .form-textarea:focus {
    border-color: var(--cyan);
  }
  .form-textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
  .form-row { display: flex; gap: 12px; }
  .form-row .form-group { flex: 1; }

  /* ── Buttons ─────────────────────────────── */
  .btn {
    font-family: var(--mono); font-size: 10px; font-weight: 700;
    letter-spacing: 1.2px; text-transform: uppercase;
    padding: 7px 16px; border: 1px solid; cursor: pointer;
    transition: all .2s; display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-cyan { border-color: var(--cyan); color: var(--cyan); background: transparent; }
  .btn-cyan:hover { background: var(--cyan); color: var(--bg); }
  .btn-cyan.solid { background: var(--cyan); color: var(--bg); }
  .btn-cyan.solid:hover { background: #33ecff; }
  .btn-green { border-color: var(--green); color: var(--green); background: transparent; }
  .btn-green:hover { background: var(--green); color: var(--bg); }
  .btn-green.solid { background: var(--green); color: var(--bg); }
  .btn-red { border-color: var(--red); color: var(--red); background: transparent; }
  .btn-red:hover { background: var(--red); color: var(--bg); }
  .btn-amber { border-color: var(--amber); color: var(--amber); background: transparent; }
  .btn-amber:hover { background: var(--amber); color: var(--bg); }
  .btn:disabled { opacity: .35; cursor: not-allowed; }
  .btn:disabled:hover { background: transparent; color: inherit; }

  /* ── Status badges ───────────────────────── */
  .status-badge {
    display: inline-block; font-size: 8px; font-weight: 700; letter-spacing: 1px;
    padding: 2px 7px; border: 1px solid; text-transform: uppercase;
  }
  .status-open     { border-color: var(--cyan);  color: var(--cyan);  background: var(--cyan-dim); }
  .status-bidding  { border-color: var(--amber); color: var(--amber); background: var(--amber-dim); }
  .status-active   { border-color: var(--green); color: var(--green); background: var(--green-dim); }
  .status-submitted{ border-color: var(--violet);color: var(--violet);background: var(--violet-dim);}
  .status-review   { border-color: var(--yellow);color: var(--yellow);background: rgba(255,215,64,.1);}
  .status-approved { border-color: var(--green); color: var(--green); background: var(--green-dim); }
  .status-disputed { border-color: var(--red);   color: var(--red);   background: var(--red-dim); }
  .status-ruled    { border-color: var(--violet);color: var(--violet);background: var(--violet-dim);}

  /* ── Task detail display ─────────────────── */
  .task-detail-row {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 6px 0; border-bottom: 1px solid var(--border);
    font-size: 11px;
  }
  .task-detail-row:last-child { border-bottom: none; }
  .task-detail-key { color: var(--text-dim); font-size: 9px; letter-spacing: 1px; text-transform: uppercase; }
  .task-detail-val { font-weight: 600; text-align: right; }

  /* ── Bid list ────────────────────────────── */
  .bid-row {
    display: flex; align-items: center; padding: 10px 14px;
    border-bottom: 1px solid var(--border); transition: background .15s;
  }
  .bid-row:hover { background: var(--bg-hover); }
  .bid-row:last-child { border-bottom: none; }
  .bid-avatar {
    width: 28px; height: 28px; border-radius: 50%; margin-right: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; flex-shrink: 0;
  }
  .bid-info { flex: 1; }
  .bid-name { font-size: 11px; font-weight: 700; }
  .bid-meta { font-size: 9px; color: var(--text-dim); margin-top: 1px; }
  .bid-amount {
    font-size: 14px; font-weight: 800; margin-right: 10px;
  }
  .bid-actions { flex-shrink: 0; }

  /* ── Escrow bar ──────────────────────────── */
  .escrow-bar {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 14px; background: var(--bg-off);
    border-bottom: 1px solid var(--border);
  }
  .escrow-icon { font-size: 14px; }
  .escrow-label { font-size: 9px; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; }
  .escrow-amount { font-size: 13px; font-weight: 700; color: var(--amber); margin-left: auto; }
  .escrow-status { font-size: 8px; color: var(--green); font-weight: 600; letter-spacing: .5px; text-transform: uppercase; }

  /* ── Deliverable display ─────────────────── */
  .deliverable-block {
    background: var(--bg); border: 1px solid var(--border-hi);
    padding: 12px 14px; font-size: 11px; line-height: 1.6;
    color: var(--text-mid); white-space: pre-wrap;
  }

  /* ── Dispute panel ───────────────────────── */
  .dispute-panel {
    border-left: 3px solid var(--red); background: var(--bg-card);
    padding: 14px; margin: 12px 16px; border: 1px solid var(--border);
    border-left: 3px solid var(--red);
  }
  .rebuttal-panel {
    border-left: 3px solid var(--amber); background: var(--bg-card);
    padding: 14px; margin: 12px 16px; border: 1px solid var(--border);
    border-left: 3px solid var(--amber);
  }
  .dispute-label {
    font-size: 8px; letter-spacing: 1.5px; text-transform: uppercase;
    font-weight: 700; margin-bottom: 6px;
  }
  .dispute-text {
    font-size: 11px; color: var(--text-mid); line-height: 1.5;
  }

  /* ── Court ruling ────────────────────────── */
  .ruling-card {
    margin: 12px 16px; border: 1px solid var(--border);
    background: var(--bg-card); overflow: hidden;
  }
  .ruling-header {
    padding: 10px 14px; background: var(--violet-dim);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
  }
  .ruling-header .gavel { font-size: 18px; animation: gavel-swing 1.5s ease-in-out; }
  .ruling-header .ruling-title {
    font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--violet);
  }
  .ruling-body { padding: 14px; }
  .ruling-scores {
    display: flex; gap: 16px; margin-bottom: 14px;
  }
  .ruling-score {
    flex: 1; text-align: center; padding: 12px 8px;
    background: var(--bg); border: 1px solid var(--border);
  }
  .ruling-score-label {
    font-size: 8px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--text-dim); margin-bottom: 6px;
  }
  .ruling-score-value { font-size: 22px; font-weight: 800; }
  .ruling-reasoning {
    font-size: 10px; color: var(--text-mid); line-height: 1.6;
    padding: 10px 12px; background: var(--bg); border: 1px solid var(--border);
    margin-top: 10px;
  }
  .ruling-payout {
    display: flex; gap: 12px; margin-top: 12px;
  }
  .payout-box {
    flex: 1; padding: 10px; border: 1px solid var(--border); background: var(--bg);
    text-align: center;
  }
  .payout-agent { font-size: 9px; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
  .payout-amount { font-size: 16px; font-weight: 800; }

  /* ── Feedback panel ──────────────────────── */
  .feedback-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 14px; border-bottom: 1px solid var(--border);
  }
  .feedback-row:last-child { border-bottom: none; }
  .feedback-from { font-size: 10px; font-weight: 700; width: 80px; flex-shrink: 0; }
  .feedback-stars { color: var(--yellow); font-size: 12px; letter-spacing: 2px; }
  .feedback-text { font-size: 10px; color: var(--text-dim); flex: 1; }
  .feedback-sealed {
    font-size: 9px; color: var(--text-dim); padding: 8px 14px;
    display: flex; align-items: center; gap: 6px;
  }

  /* ── Right: Live Event Feed ──────────────── */
  .feed-panel {
    width: 360px; flex-shrink: 0; display: flex; flex-direction: column;
    overflow: hidden; background: var(--bg);
  }
  .feed-header {
    padding: 10px 14px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px; flex-shrink: 0;
  }
  .feed-title {
    font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--text-dim); font-weight: 700;
  }
  .feed-scroll { flex: 1; overflow-y: auto; }
  .feed-item {
    display: flex; align-items: flex-start; gap: 8px;
    padding: 7px 14px; border-bottom: 1px solid var(--border);
    transition: background .15s; animation: slide-in .3s ease-out;
  }
  .feed-item:hover { background: var(--bg-hover); }
  .feed-badge {
    font-size: 7px; font-weight: 700; letter-spacing: .5px;
    padding: 1px 5px; border: 1px solid; text-transform: uppercase;
    flex-shrink: 0; margin-top: 1px;
  }
  .feed-text { font-size: 10px; color: var(--text-mid); flex: 1; line-height: 1.4; }
  .feed-text .hl-cyan { color: var(--cyan); }
  .feed-text .hl-green { color: var(--green); font-weight: 600; }
  .feed-text .hl-red { color: var(--red); font-weight: 600; }
  .feed-text .hl-amber { color: var(--amber); }
  .feed-text .hl-violet { color: var(--violet); }
  .feed-time { font-size: 8px; color: var(--text-dim); flex-shrink: 0; }

  .badge-task     { border-color: #4a6fa5; color: #6a8fc5; background: #4a6fa511; }
  .badge-bid      { border-color: #a06080; color: #c080a0; background: #a0608011; }
  .badge-escrow   { border-color: #a07040; color: #c09060; background: #a0704011; }
  .badge-contract { border-color: #6a5a8c; color: #8a7aac; background: #6a5a8c11; }
  .badge-submit   { border-color: #4a7a80; color: #6a9aa0; background: #4a7a8011; }
  .badge-payout   { border-color: #4a8c5c; color: #6aac7c; background: #4a8c5c11; }
  .badge-dispute  { border-color: #8c4a4a; color: #ac6a6a; background: #8c4a4a11; }
  .badge-ruling   { border-color: #6a4a80; color: #8a6aa0; background: #6a4a8011; }
  .badge-rep      { border-color: #8a7a3a; color: #aa9a5a; background: #8a7a3a11; }
  .badge-review   { border-color: #7a6a3a; color: #9a8a5a; background: #7a6a3a11; }

  /* ── Bottom Ticker ───────────────────────── */
  .bottom-ticker {
    height: 28px; flex-shrink: 0; background: var(--bg-row);
    border-top: 1px solid var(--border-hi);
    overflow: hidden; display: flex; align-items: center; position: relative;
  }
  .ticker-track {
    display: inline-flex; gap: 24px; white-space: nowrap; padding-left: 100%;
    animation: ticker-scroll 40s linear infinite;
  }
  .ticker-item {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 10px; color: var(--text-dim);
  }
  .ticker-item .sym { font-weight: 700; color: var(--text-mid); }
  .ticker-item .up { color: var(--green); }
  .ticker-item .dn { color: var(--red); }
  .ticker-fade-l, .ticker-fade-r {
    position: absolute; top: 0; bottom: 0; width: 40px; pointer-events: none; z-index: 2;
  }
  .ticker-fade-l { left: 0; background: linear-gradient(to right, var(--bg-row), transparent); }
  .ticker-fade-r { right: 0; background: linear-gradient(to left, var(--bg-row), transparent); }

  /* ── Progress overlay ────────────────────── */
  .demo-controls {
    position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 10px;
    background: var(--bg-card); border: 1px solid var(--border-hi);
    padding: 8px 16px; z-index: 100; box-shadow: 0 4px 24px rgba(0,0,0,.5);
  }
  .demo-controls .btn { font-size: 9px; padding: 5px 12px; }
  .demo-step-label {
    font-size: 9px; color: var(--text-mid); letter-spacing: .5px; min-width: 200px;
  }
  .demo-progress {
    width: 180px; height: 4px; background: var(--border);
    position: relative; overflow: hidden;
  }
  .demo-progress-fill {
    height: 100%; background: var(--cyan); transition: width .4s ease-out;
  }
</style>
</head>
<body>

<!-- ═══ TOP NAV ════════════════════════════════════════════════ -->
<nav class="topnav">
  <div class="topnav-brand">
    <span class="topnav-logo">ATE</span>
    <span class="topnav-sep"></span>
    <span class="topnav-sub">Agent Task Economy</span>
  </div>
  <div class="topnav-right">
    <span class="topnav-link">Observatory</span>
    <span class="topnav-link active">Task Lifecycle</span>
    <span class="topnav-link">Create Task</span>
    <span style="margin-left:8px; display:flex; align-items:center; gap:5px;">
      <span class="live-dot"></span>
      <span class="live-label">LIVE</span>
    </span>
  </div>
</nav>

<!-- ═══ PHASE STRIP ════════════════════════════════════════════ -->
<div class="phase-strip" id="phase-strip">
  <div class="phase-step active" data-phase="0">
    <span class="phase-icon">📝</span> Post
  </div>
  <div class="phase-step pending" data-phase="1">
    <span class="phase-icon">⚡</span> Bid
  </div>
  <div class="phase-step pending" data-phase="2">
    <span class="phase-icon">🤝</span> Contract
  </div>
  <div class="phase-step pending" data-phase="3">
    <span class="phase-icon">🔨</span> Deliver
  </div>
  <div class="phase-step pending" data-phase="4">
    <span class="phase-icon">👁</span> Review
  </div>
  <div class="phase-step pending" data-phase="5">
    <span class="phase-icon">⚖️</span> Ruling
  </div>
  <div class="phase-step pending" data-phase="6">
    <span class="phase-icon">💰</span> Settle
  </div>
</div>

<!-- ═══ MAIN AREA ══════════════════════════════════════════════ -->
<div class="main-area">

  <!-- LEFT: TASK LIFECYCLE VIEW -->
  <div class="lifecycle-panel">
    <div class="lifecycle-header">
      <span class="lifecycle-title" id="panel-title">📝 Post a New Task</span>
      <span class="status-badge status-open" id="task-status">DRAFT</span>
    </div>
    <div class="lifecycle-content" id="lifecycle-content">
      <!-- Phase 0: Create Task Form -->
      <div id="phase-content"></div>
    </div>
  </div>

  <!-- RIGHT: LIVE EVENT FEED -->
  <div class="feed-panel">
    <div class="feed-header">
      <span class="feed-title">📡 Event Feed</span>
    </div>
    <div class="feed-scroll" id="feed-scroll"></div>
  </div>

</div>

<!-- ═══ BOTTOM TICKER ══════════════════════════════════════════ -->
<div class="bottom-ticker">
  <div class="ticker-fade-l"></div>
  <div class="ticker-track" id="ticker-track"></div>
  <div class="ticker-fade-r"></div>
</div>

<!-- ═══ DEMO CONTROLS ══════════════════════════════════════════ -->
<div class="demo-controls">
  <button class="btn btn-cyan" id="btn-prev" disabled>← PREV</button>
  <div class="demo-progress">

    { phase: 3, title: '🔨 Worker Delivering',      status: 'IN EXEC',   statusCls: 'status-active',   label: 'Carol Submits Deliverable' },

    { phase: 6, title: '💰 Settlement',              status: 'SETTLED',   statusCls: 'status-approved', label: 'Escrow Released' },
    { phase: 6, title: '💰 Complete',                status: 'COMPLETE',  statusCls: 'status-approved', label: 'Feedback Exchange' },
  ];

  let currentStep = 0;
  let autoTimer = null;

  // ── Feed events per step ──────────────────
  const FEED_EVENTS = [
    [],
    [
      { badge: 'task', text: `<span class="hl-cyan">Alice</span> posted task <span class="hl-cyan">${TASK.id}</span> — "${TASK.title}" for <span class="hl-green">${TASK.reward} ©</span>` },
      { badge: 'escrow', text: `Escrow locked <span class="hl-green">${TASK.reward} ©</span> from Alice's wallet` },
    ],
    [
      { badge: 'bid', text: `<span class="hl-cyan">Bob</span> placed binding bid on <span class="hl-cyan">${TASK.id}</span> for <span class="hl-green">12 ©</span>` },
    ],
    [

    ],

    ],

      { badge: 'ruling', text: `<span class="hl-violet">COURT RULING</span> on <span class="hl-cyan">${TASK.id}</span> — Spec: <span class="hl-green">100%</span> Delivery: <span class="hl-red">40%</span>` },

  // ── Render functions ──────────────────────
  function renderPhaseStrip(step) {
    const steps = document.querySelectorAll('.phase-step');
    const targetPhase = STEPS[step].phase;
    steps.forEach((el, i) => {
      el.className = 'phase-step';
      if (i < targetPhase) { el.classList.add('completed'); el.innerHTML = el.innerHTML.replace(/<span class="phase-check">.*<\/span>/, '') + '<span class="phase-check">✓</span>'; }
      else if (i === targetPhase) el.classList.add('active');
      else el.classList.add('pending');
    });
  }

  function renderCreateForm() {

  function renderTaskPosted() {

  function renderBids(count) {

    let html = `

        <span class="escrow-label">Escrow</span>
        <span class="escrow-amount">${TASK.reward} ©</span>

          <span style="font-size:9px;color:var(--text-dim)">${count} bid${count>1?'s':''} received</span>
        </div>
        <div class="card-body no-pad">`;
    bids.forEach(b => {
      html += `
          <div class="bid-row" style="animation:slide-in .3s ease-out">

            <div class="bid-actions">
              <button class="btn btn-green" disabled>Accept</button>

          </div>`;
    });
    html += `</div></div>`;
    return html;
  }

            <span class="task-detail-key">Alice — Spec Quality</span>

        <div style="font-size:9px;color:var(--text-dim);margin-top:6px">The economy punishes bad specifications. Precise specs protect the poster.</div>
      </div>`;

  const RENDERERS = [
    renderCreateForm, renderTaskPosted,
    () => renderBids(1), () => renderBids(2),
    renderContract, renderDeliverable,
    renderReview, renderDispute, renderRebuttal,
    renderRuling, renderSettlement, renderFeedback,
  ];

  // ── Feed management ───────────────────────
  function addFeedEvents(step) {
    const events = FEED_EVENTS[step] || [];
    const scroll = document.getElementById('feed-scroll');
    const now = new Date();
    const timeStr = now.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
    events.forEach((ev, i) => {
      setTimeout(() => {
        const div = document.createElement('div');
        div.className = 'feed-item';
        div.innerHTML = `
          <span class="feed-badge badge-${ev.badge}">${ev.badge}</span>
          <span class="feed-text">${ev.text}</span>
          <span class="feed-time">${timeStr}</span>`;
        scroll.insertBefore(div, scroll.firstChild);
      }, i * 300);
    });
  }

  // ── Step navigation ───────────────────────
  function goToStep(step) {
    if (step < 0 || step >= STEPS.length) return;
    currentStep = step;
    const s = STEPS[step];

    // Update phase strip
    renderPhaseStrip(step);

    // Update header
    document.getElementById('panel-title').textContent = s.title;
    const badge = document.getElementById('task-status');
    badge.textContent = s.status;
    badge.className = 'status-badge ' + s.statusCls;

    // Update content
    document.getElementById('phase-content').innerHTML = RENDERERS[step]();

    // Add feed events
    addFeedEvents(step);

    // Update controls
    document.getElementById('btn-prev').disabled = step === 0;
    document.getElementById('btn-next').disabled = step === STEPS.length - 1;
    document.getElementById('step-label').textContent = `Step ${step + 1}/${STEPS.length} — ${s.label}`;
    document.getElementById('progress-fill').style.width = ((step / (STEPS.length - 1)) * 100) + '%';
  }

  // ── Controls ──────────────────────────────
  document.getElementById('btn-next').addEventListener('click', () => {
    goToStep(currentStep + 1);
  });
  document.getElementById('btn-prev').addEventListener('click', () => {
    goToStep(currentStep - 1);
  });
  document.getElementById('btn-auto').addEventListener('click', function() {
    if (autoTimer) {
      clearInterval(autoTimer);
      autoTimer = null;
      this.textContent = '▶ AUTO';
      this.classList.remove('solid');
      return;
    }
    this.textContent = '⏸ PAUSE';
    this.classList.add('solid');
    autoTimer = setInterval(() => {
      if (currentStep < STEPS.length - 1) {
        goToStep(currentStep + 1);
      } else {
        clearInterval(autoTimer);
        autoTimer = null;
        document.getElementById('btn-auto').textContent = '▶ AUTO';
        document.getElementById('btn-auto').classList.remove('solid');
      }
    }, 3000);
  });

  // Keyboard navigation
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); goToStep(currentStep + 1); }
    if (e.key === 'ArrowLeft') { e.preventDefault(); goToStep(currentStep - 1); }
  });

  // ── Bottom ticker ─────────────────────────
  function buildTicker() {
    const items = [
      { sym: 'GDP/TOTAL', val: '42,685', chg: '+2.4%', up: true },
      { sym: 'TASK/OPEN', val: '14', chg: '-1', up: false },
      { sym: 'ESCROW', val: '2,480 ©', chg: '+5.1%', up: true },
      { sym: 'SPEC/QUAL', val: '68%', chg: '+2.4%', up: true },
      { sym: 'COMP/RATE', val: '87%', chg: '+1.2%', up: true },
      { sym: 'DISPUTES', val: '2', chg: '+1', up: false },
      { sym: 'GDP/RATE', val: '135.2/hr', chg: '+3.8%', up: true },
      { sym: 'AGENTS', val: '8/10', chg: '0.0%', up: null },
    ];
    const doubled = [...items, ...items];
    document.getElementById('ticker-track').innerHTML = doubled.map(i => {
      const cls = i.up === true ? 'up' : i.up === false ? 'dn' : '';
      const arrow = i.up === true ? '▲' : i.up === false ? '▼' : '–';
      return `<span class="ticker-item"><span class="sym">${i.sym}</span> ${i.val} <span class="${cls}">${arrow} ${i.chg}</span></span>`;
    }).join('');
  }

  // ── Boot ──────────────────────────────────
  buildTicker();
  goToStep(0);

})();
</script>
</body>
</html>
